<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程待办</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }

        h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 25px; font-size: 14px; }

        .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 25px; margin-bottom: 20px; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input { flex: 1; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: border-color 0.3s; }
        .input-group input:focus { outline: none; border-color: #667eea; }
        .input-group button { padding: 14px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        .input-group button:hover { transform: scale(1.05); }

        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat { flex: 1; text-align: center; padding: 12px; background: #f8f9fa; border-radius: 10px; }
        .stat .num { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat .label { font-size: 12px; color: #888; margin-top: 3px; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-bar button { padding: 8px 16px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; background: #f0f0f0; color: #666; transition: all 0.2s; }
        .filter-bar button.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .filter-bar button:hover { background: #e0e0e0; }
        .filter-bar button.active:hover { background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%); }

        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: center; gap: 12px; padding: 15px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .todo-item:last-child { border-bottom: none; }
        .todo-item:hover { background: #f8f9fa; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: #aaa; }
        .todo-item .checkbox { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .todo-item .checkbox.checked { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-color: #667eea; }
        .todo-item .checkbox.checked::after { content: '✓'; color: #fff; font-size: 14px; }
        .todo-item .todo-text { flex: 1; color: #333; font-size: 15px; line-height: 1.5; }
        .todo-item .todo-actions { display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s; }
        .todo-item:hover .todo-actions { opacity: 1; }
        .todo-item .btn-edit, .todo-item .btn-delete { padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .todo-item .btn-edit { background: #3498db; color: #fff; }
        .todo-item .btn-delete { background: #e74c3c; color: #fff; }

        .empty { text-align: center; color: #aaa; padding: 40px; font-size: 15px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: 16px; padding: 30px; max-width: 400px; width: 90%; }
        .modal-content h3 { color: #333; margin-bottom: 15px; }
        .modal-content input { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 15px; }
        .modal-content input:focus { outline: none; border-color: #667eea; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-actions button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .modal-actions .btn-cancel { background: #e0e0e0; color: #666; }
        .modal-actions .btn-save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 25px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 2000; transition: transform 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }

        .footer { text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 15px; }

        @media (max-width: 480px) {
            .input-group { flex-direction: column; }
            .stats { flex-direction: column; }
            .todo-item .todo-actions { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>远程待办</h1>
        <p class="subtitle">随时随地管理你的任务</p>

        <div class="card">
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="输入新任务..." onkeypress="if(event.key==='Enter')addTodo()">
                <button onclick="addTodo()">添加</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="num" id="totalCount">0</div>
                    <div class="label">全部</div>
                </div>
                <div class="stat">
                    <div class="num" id="completedCount">0</div>
                    <div class="label">已完成</div>
                </div>
                <div class="stat">
                    <div class="num" id="pendingCount">0</div>
                    <div class="label">待完成</div>
                </div>
            </div>

            <div class="filter-bar">
                <button class="active" onclick="setFilter('all')">全部</button>
                <button onclick="setFilter('pending')">待完成</button>
                <button onclick="setFilter('completed')">已完成</button>
            </div>

            <ul class="todo-list" id="todoList"></ul>
        </div>

        <p class="footer">© 2025 远程待办 · 数据存储在服务器端</p>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>编辑任务</h3>
            <input type="text" id="editInput">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-save" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '/api/todos';
        let todos = [];
        let currentFilter = 'all';
        let editingId = null;

        async function fetchTodos() {
            try {
                const res = await fetch(API_URL);
                todos = await res.json();
                renderTodos();
            } catch (err) {
                showToast('获取数据失败', 'error');
            }
        }

        async function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) {
                showToast('请输入任务内容', 'error');
                return;
            }
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const newTodo = await res.json();
                todos.unshift(newTodo);
                renderTodos();
                input.value = '';
                showToast('添加成功', 'success');
            } catch (err) {
                showToast('添加失败', 'error');
            }
        }

        async function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !todo.completed })
                });
                todo.completed = !todo.completed;
                renderTodos();
            } catch (err) {
                showToast('更新失败', 'error');
            }
        }

        async function deleteTodo(id) {
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                todos = todos.filter(t => t.id !== id);
                renderTodos();
                showToast('已删除', 'success');
            } catch (err) {
                showToast('删除失败', 'error');
            }
        }

        function openEditModal(id) {
            editingId = id;
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            document.getElementById('editInput').value = todo.text;
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingId = null;
        }

        async function saveEdit() {
            const newText = document.getElementById('editInput').value.trim();
            if (!newText) {
                showToast('任务内容不能为空', 'error');
                return;
            }
            try {
                await fetch(`${API_URL}/${editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: newText })
                });
                const todo = todos.find(t => t.id === editingId);
                if (todo) todo.text = newText;
                renderTodos();
                closeEditModal();
                showToast('保存成功', 'success');
            } catch (err) {
                showToast('保存失败', 'error');
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-bar button').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === (filter === 'all' ? '全部' : filter === 'pending' ? '待完成' : '已完成'));
            });
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            let filtered = todos;
            if (currentFilter === 'pending') filtered = todos.filter(t => !t.completed);
            if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = total - completed;

            if (filtered.length === 0) {
                list.innerHTML = '<li class="empty">暂无任务</li>';
                return;
            }

            list.innerHTML = filtered.map(t => `
                <li class="todo-item ${t.completed ? 'completed' : ''}">
                    <div class="checkbox ${t.completed ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></div>
                    <span class="todo-text">${escapeHtml(t.text)}</span>
                    <div class="todo-actions">
                        <button class="btn-edit" onclick="openEditModal(${t.id})">编辑</button>
                        <button class="btn-delete" onclick="deleteTodo(${t.id})">删除</button>
                    </div>
                </li>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        fetchTodos();
    </script>
</body>
</html>
